<div class="modal-dialog modal-dialog-scrollable modal-xl">
    <div class="modal-content">
        <div class="modal-header">
            <h4 class="modal-title fs-6">{{ title }}</h4>
            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
            <p class="text-muted small mb-3">
                Formato compatible con <strong>Importar JSON</strong>. Puedes copiarlo o descargarlo.
            </p>
            <textarea
                id="instrumentoJsonPreview"
                class="form-control font-monospace small"
                rows="22"
                readonly
                spellcheck="false"
                style="font-size: 0.8rem; tab-size: 2;"
            >{{ json_text }}</textarea>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" id="btnCopiarJsonInstrumento">
                <i class="fa-solid fa-copy me-1"></i> Copiar
            </button>
            <a href="{{ descargar_url }}" class="btn btn-outline-primary" download>
                <i class="fa-solid fa-download me-1"></i> Descargar
            </a>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
    </div>
</div>
<script>
(function () {
    const btn = document.getElementById('btnCopiarJsonInstrumento');
    const ta = document.getElementById('instrumentoJsonPreview');
    if (!btn || !ta) return;
    btn.addEventListener('click', async function () {
        try {
            await navigator.clipboard.writeText(ta.value);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check me-1"></i> Copiado';
            setTimeout(function () { btn.innerHTML = original; }, 1800);
        } catch (e) {
            ta.select();
            document.execCommand('copy');
        }
    });
})();
</script>
